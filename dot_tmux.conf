##### CORE (executa instantaneamente) #####

# Indexação a partir de 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Shell padrão
set -g default-shell /usr/bin/fish

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Histórico
set -g history-limit 10000

# Responsividade
set -s escape-time 0

# Mouse
set -g mouse on

# Status bar (intervalo maior = menos CPU)
set -g status-interval 10
set -g status-left-length 100
set -g status-right-length 100


##### TPM + PLUGINS (definição apenas, sem execução) #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Tema
set -g @plugin 'egel/tmux-gruvbox'

##### CONFIGURAÇÃO DO TEMA (leve) #####
set -g @tmux-gruvbox 'dark'

##### YANK (clipboard) #####
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'


##### ATALHOS (sem custo de runtime) #####

# Navegação entre panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Splits preservando path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Layout
bind -n M-v select-layout even-vertical
bind -n M-h select-layout even-horizontal

# Sync panes
bind S setw synchronize-panes

# Reload
bind r source-file ~/.tmux.conf \; display "Configuração recarregada!"


##### INTEGRAÇÃO TMUX ↔ NEOVIM (otimizada) #####

# Detecta editor (avaliado apenas quando a tecla é pressionada)
is_vim="ps -o comm= -t '#{pane_tty}' | grep -iqE '(n?vim|view)'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'


##### AUTO-ZOOM NO NEOVIM (LAZY) #####

set-hook -g pane-focus-in \
  'if-shell "ps -o comm= -t #{pane_tty} | grep -iq nvim" \
  "if-shell \"[ #{window_zoomed_flag} -eq 0 ]\" \"resize-pane -Z\""'


##### STATUS BAR (leve e informativa) #####

set -g status-left ""
set -g status-right "#S:#I.#P"


##### TPM — SEMPRE NO FINAL #####

run '~/.tmux/plugins/tpm/tpm'

