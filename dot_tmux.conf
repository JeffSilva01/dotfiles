# === Plugins e Configurações para Tmux Produtivo ===

# Iniciar indexação de janelas e painéis a partir de 1 em vez de 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# set -g exit-empty off
# set -g exit-unattached off
set-option -g default-shell /usr/bin/fish

# Aumentar o histórico de linha
set -g history-limit 10000

# Melhorar a velocidade de resposta do tmux
set -s escape-time 0

# Reduzir intervalo de atualização da barra de status
set -g status-interval 10

# Ativar modo mouse para seleção e redimensionamento
set -g mouse on

# === Plugins Essenciais para Produtividade ===
set -g @plugin 'tmux-plugins/tpm'                  # Gerenciador de plugins
set -g @plugin 'tmux-plugins/tmux-sensible'        # Configurações básicas sensatas

# === Plugins de Produtividade (Leves) ===
set -g @plugin 'tmux-plugins/tmux-yank'            # Melhor integração com clipboard

# set -g @plugin 'egel/tmux-gruvbox'
# # set desired theme options...
# set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'

set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
# ...alongside
set -g @plugin 'tmux-plugins/tpm'

# ~/.tmux.conf

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
# For TPM, instead use `run ~/.tmux/plugins/tmux/catppuccin.tmux`

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
# Or, if using TPM, just run TPM

# === Configurações para os Plugins ===
# Configurações simplificadas para tmux-yank
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# === Atalhos Avançados ===
# Navegação de painéis avançada
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Navegação consistente entre tmux e nvim
# Requer o plugin 'christoomey/vim-tmux-navigator' no LazyVim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Recarregar configuração com r
bind r source-file ~/.tmux.conf \; display "Configuração recarregada!"

# Divisão de painéis mais intuitiva
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alterna layout entre horizontal e vertical
bind-key -n M-v select-layout even-vertical
bind-key -n M-h select-layout even-horizontal

# Sincronização de painéis (útil para comandos em múltiplos servidores)
bind-key S setw synchronize-panes

# Cores de 256 cores
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Detectar o Neovim/LazyVim para maximização automática
is_editor="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Maximizar automaticamente quando o cursor entra no painel do editor (LazyVim)
set-hook -g pane-focus-in "if-shell \"$is_editor\" 'if-shell \"[[ #{window_zoomed_flag} -eq 0 ]]\" \"resize-pane -Z\"'"

# Inicialização do TPM (mantenha esta linha no final do arquivo)
run '~/.tmux/plugins/tpm/tpm'
