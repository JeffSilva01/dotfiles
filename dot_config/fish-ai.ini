[fish-ai]
# Escolhe qual bloco de configuração usar
configuration = google

# Ativa integração com Git (para gerar mensagens de commit)
git_integration = true

[google]
provider = google
model = gemini-2.5-flash

# NÃO coloque a chave aqui.
# Você vai salvar a chave no keyring usando:
#   fish_ai_put_api_key google

